name: Update Generated Files

on:
  workflow_dispatch: # Allows manual triggering
  push:
    branches: [ master ]
    paths:
      - 'samples/**/*.dxf'
      - 'samples/**/*description*.md'
      - 'samples/**/*description*.txt'
      - 'samples/**/*description*'

jobs:
  update-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history so we can diff the pushed commit against its parent to find which DXF files actually changed.
          fetch-depth: 0

      - name: Checkout dxf-preview renderer
        uses: actions/checkout@v6
        with:
          repository: ivanshuba/dxf-preview
          path: scripts/dxf-preview
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/dxf-preview/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/dxf-preview/requirements.txt

      - name: Render DXF previews
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          render_one() {
            python scripts/dxf-preview/render_dxf.py "$1" --square --margin 20
          }

          render_all() {
            echo "Rendering previews for all DXF files under samples/."
            python scripts/dxf-preview/render_dxf.py \
              --folder samples \
              --recursive 2 \
              --square \
              --margin 20
          }

          # Manual runs (workflow_dispatch) regenerate everything.
          if [ "$EVENT" != "push" ]; then
            echo "Event is '$EVENT' (not a push): rendering all previews."
            render_all
            exit 0
          fi

          # First push / new branch / force-push with no reachable base: render all.
          if [ -z "${BEFORE:-}" ] \
            || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
            || ! git rev-parse -q --verify "$BEFORE^{commit}" >/dev/null; then
            echo "No usable base commit ('${BEFORE:-}'): rendering all previews."
            render_all
            exit 0
          fi

          echo "Diffing $BEFORE..$AFTER for changed DXF files."

          # Only Added/Copied/Modified/Renamed (not Deleted) DXF files under samples/.
          # -z + read -d '' keeps filenames with spaces intact.
          mapfile -d '' -t CHANGED < <(
            git diff -z --name-only --diff-filter=ACMR "$BEFORE" "$AFTER" -- samples \
              | { grep -ziE '\.dxf$' || true; }
          )

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "No DXF files changed in this push; skipping preview rendering."
            exit 0
          fi

          echo "Rendering ${#CHANGED[@]} changed DXF file(s):"
          printf '  %s\n' "${CHANGED[@]}"

          for f in "${CHANGED[@]}"; do
            render_one "$f"
          done

      - name: Install PowerShell
        run: |
          wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Generate Gallery
        run: |
          pwsh ./scripts/Generate-Gallery.ps1 -GitHubToken ${{ secrets.GITHUB_TOKEN }} -Owner ${{ github.repository_owner }} -Repo ${{ github.event.repository.name }} -OutputFile README.md

      - name: Generate Properties File
        run: |
          pwsh ./scripts/Generate-Dxf-Properties.ps1 -GitHubToken ${{ secrets.GITHUB_TOKEN }} -Owner ${{ github.repository_owner }} -Repo ${{ github.event.repository.name }}

      - name: Add custom header to README
        run: |
          echo "# This repository provides a set of DXF files samples" > README.tmp
          echo "" >> README.tmp
          cat README.md >> README.tmp
          mv README.tmp README.md

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add README.md samples/dxf-files.properties 'samples/**/*.png'

          # Commit only if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update generated files"
            git pull --rebase
            git push
          else
            echo "No changes to commit."
          fi